services:
  openclaw-voice:
    build:
      context: .
      args:
        CUDA_BASE_IMAGE: ${OPENCLAW_CUDA_BASE_IMAGE:-nvidia/cuda:12.1.1-cudnn8-runtime-ubuntu22.04}
        TORCH_INDEX_URL: ${OPENCLAW_TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu121}
        TORCH_VERSION: ${OPENCLAW_TORCH_VERSION:-}
        TORCHAUDIO_VERSION: ${OPENCLAW_TORCHAUDIO_VERSION:-}
        FASTER_WHISPER_VERSION: ${OPENCLAW_FASTER_WHISPER_VERSION:-}
        CTRANSLATE2_VERSION: ${OPENCLAW_CTRANSLATE2_VERSION:-}
    ports:
      - "8765:8765"
    environment:
      - OPENCLAW_HOST=0.0.0.0
      - OPENCLAW_PORT=8765
      - OPENCLAW_STT_MODEL=${OPENCLAW_STT_MODEL:-base}
      - OPENCLAW_STT_DEVICE=${OPENCLAW_STT_DEVICE:-cuda}
      - OPENCLAW_REQUIRE_AUTH=${OPENCLAW_REQUIRE_AUTH:-false}
      - OPENCLAW_MASTER_KEY=${OPENCLAW_MASTER_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - OPENCLAW_TTS_BACKEND=${OPENCLAW_TTS_BACKEND:-}
      - OPENCLAW_TTS_API_BASE_URL=${OPENCLAW_TTS_API_BASE_URL:-}
      - OPENCLAW_TTS_API_KEY=${OPENCLAW_TTS_API_KEY:-}
      - OPENCLAW_TTS_API_MODEL=${OPENCLAW_TTS_API_MODEL:-}
      - OPENCLAW_TTS_API_VOICE=${OPENCLAW_TTS_API_VOICE:-}
      - OPENCLAW_TTS_RESPONSE_FORMAT=${OPENCLAW_TTS_RESPONSE_FORMAT:-}
      - OPENCLAW_TTS_VOICE_ID=${OPENCLAW_TTS_VOICE_ID:-}
    volumes:
      # Persist downloaded models
      - whisper-models:/root/.cache/huggingface
      - ./voices:/app/voices
    gpus: all
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # CPU-only version (no GPU required)
  openclaw-voice-cpu:
    build:
      context: .
      args:
        CUDA_BASE_IMAGE: ${OPENCLAW_CUDA_BASE_IMAGE:-nvidia/cuda:12.1.1-cudnn8-runtime-ubuntu22.04}
        TORCH_INDEX_URL: ${OPENCLAW_TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu121}
        TORCH_VERSION: ${OPENCLAW_TORCH_VERSION:-}
        TORCHAUDIO_VERSION: ${OPENCLAW_TORCHAUDIO_VERSION:-}
        FASTER_WHISPER_VERSION: ${OPENCLAW_FASTER_WHISPER_VERSION:-}
        CTRANSLATE2_VERSION: ${OPENCLAW_CTRANSLATE2_VERSION:-}
    ports:
      - "8766:8765"
    environment:
      - OPENCLAW_HOST=0.0.0.0
      - OPENCLAW_PORT=8765
      - OPENCLAW_STT_MODEL=${OPENCLAW_STT_MODEL:-tiny}
      - OPENCLAW_STT_DEVICE=cpu
      - OPENCLAW_REQUIRE_AUTH=${OPENCLAW_REQUIRE_AUTH:-false}
      - OPENCLAW_MASTER_KEY=${OPENCLAW_MASTER_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - OPENCLAW_TTS_BACKEND=${OPENCLAW_TTS_BACKEND:-}
      - OPENCLAW_TTS_API_BASE_URL=${OPENCLAW_TTS_API_BASE_URL:-}
      - OPENCLAW_TTS_API_KEY=${OPENCLAW_TTS_API_KEY:-}
      - OPENCLAW_TTS_API_MODEL=${OPENCLAW_TTS_API_MODEL:-}
      - OPENCLAW_TTS_API_VOICE=${OPENCLAW_TTS_API_VOICE:-}
      - OPENCLAW_TTS_RESPONSE_FORMAT=${OPENCLAW_TTS_RESPONSE_FORMAT:-}
      - OPENCLAW_TTS_VOICE_ID=${OPENCLAW_TTS_VOICE_ID:-}
    volumes:
      - whisper-models:/root/.cache/huggingface
      - ./voices:/app/voices
    profiles:
      - cpu
    restart: unless-stopped

volumes:
  whisper-models:
