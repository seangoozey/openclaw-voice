services:
  openclaw-voice:
    build:
      context: .
    ports:
      - "8765:8765"
    environment:
      - OPENCLAW_HOST=0.0.0.0
      - OPENCLAW_PORT=8765
      - OPENCLAW_STT_MODEL=${OPENCLAW_STT_MODEL:-base}
      - OPENCLAW_STT_DEVICE=${OPENCLAW_STT_DEVICE:-cuda}
      - OPENCLAW_REQUIRE_AUTH=${OPENCLAW_REQUIRE_AUTH:-false}
      - OPENCLAW_MASTER_KEY=${OPENCLAW_MASTER_KEY:-}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - OPENCLAW_TTS_BACKEND=${OPENCLAW_TTS_BACKEND:-}
      - OPENCLAW_TTS_API_BASE_URL=${OPENCLAW_TTS_API_BASE_URL:-}
      - OPENCLAW_TTS_API_KEY=${OPENCLAW_TTS_API_KEY:-}
      - OPENCLAW_TTS_API_MODEL=${OPENCLAW_TTS_API_MODEL:-}
      - OPENCLAW_TTS_API_VOICE=${OPENCLAW_TTS_API_VOICE:-}
      - OPENCLAW_TTS_RESPONSE_FORMAT=${OPENCLAW_TTS_RESPONSE_FORMAT:-}
      - OPENCLAW_TTS_SAMPLE_RATE=${OPENCLAW_TTS_SAMPLE_RATE:-24000}
      - OPENCLAW_TTS_VOICE_ID=${OPENCLAW_TTS_VOICE_ID:-}
    volumes:
      # Persist downloaded models
      - whisper-models:/root/.cache/huggingface
      - whisper-cache:/root/.cache/whisper
      - ./voices:/app/voices
    gpus: all
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # CPU-only version (no GPU required)
  openclaw-voice-cpu:
    build:
      context: .
    ports:
      - "8766:8765"
    environment:
      - OPENCLAW_HOST=0.0.0.0
      - OPENCLAW_PORT=8765
      - OPENCLAW_STT_MODEL=${OPENCLAW_STT_MODEL:-tiny}
      - OPENCLAW_STT_DEVICE=cpu
      - OPENCLAW_REQUIRE_AUTH=${OPENCLAW_REQUIRE_AUTH:-false}
      - OPENCLAW_MASTER_KEY=${OPENCLAW_MASTER_KEY:-}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - OPENCLAW_TTS_BACKEND=${OPENCLAW_TTS_BACKEND:-}
      - OPENCLAW_TTS_API_BASE_URL=${OPENCLAW_TTS_API_BASE_URL:-}
      - OPENCLAW_TTS_API_KEY=${OPENCLAW_TTS_API_KEY:-}
      - OPENCLAW_TTS_API_MODEL=${OPENCLAW_TTS_API_MODEL:-}
      - OPENCLAW_TTS_API_VOICE=${OPENCLAW_TTS_API_VOICE:-}
      - OPENCLAW_TTS_RESPONSE_FORMAT=${OPENCLAW_TTS_RESPONSE_FORMAT:-}
      - OPENCLAW_TTS_SAMPLE_RATE=${OPENCLAW_TTS_SAMPLE_RATE:-24000}
      - OPENCLAW_TTS_VOICE_ID=${OPENCLAW_TTS_VOICE_ID:-}
    volumes:
      - whisper-models:/root/.cache/huggingface
      - whisper-cache:/root/.cache/whisper
      - ./voices:/app/voices
    profiles:
      - cpu
    restart: unless-stopped

volumes:
  whisper-models:
  whisper-cache:
